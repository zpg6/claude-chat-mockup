<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>claude-chat-mockup — example</title>
        <!-- In your app: import "claude-chat-mockup/style.css" -->
        <link rel="stylesheet" href="../dist/style.css" />
        <style>
            :root {
                color-scheme: light dark;
            }
            body {
                margin: 0;
                min-height: 100vh;
                box-sizing: border-box;
                padding: 40px 24px 64px;
                background: #f4f1ea;
                color: #2a2721;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }
            @media (prefers-color-scheme: dark) {
                body {
                    background: #121310;
                    color: #f3f0e8;
                }
            }
            .lede {
                text-align: center;
                max-width: 480px;
                margin: 0 auto 28px;
            }
            .lede h1 {
                margin: 0 0 4px;
                font-size: 20px;
            }
            .lede p {
                margin: 0;
                opacity: 0.7;
                font-size: 14px;
            }

            /* Two-column layout: controls panel + live hero. */
            .layout {
                display: grid;
                grid-template-columns: minmax(280px, 340px) minmax(0, 460px);
                gap: 32px;
                align-items: start;
                justify-content: center;
            }
            @media (max-width: 760px) {
                .layout {
                    grid-template-columns: minmax(0, 460px);
                }
            }

            .panel {
                border: 1px solid rgba(128, 128, 128, 0.28);
                border-radius: 14px;
                padding: 18px;
                background: rgba(255, 255, 255, 0.55);
                display: flex;
                flex-direction: column;
                gap: 14px;
                position: sticky;
                top: 24px;
            }
            @media (prefers-color-scheme: dark) {
                .panel {
                    background: rgba(255, 255, 255, 0.04);
                }
            }
            .panel h2 {
                margin: 0;
                font-size: 12px;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                opacity: 0.55;
            }
            .field {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .field > label {
                font-size: 12px;
                font-weight: 600;
                opacity: 0.8;
            }
            .field > label code {
                font-weight: 500;
                opacity: 0.55;
                font-size: 11px;
            }
            .field input,
            .field textarea,
            .field select {
                font:
                    400 13px -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                padding: 7px 9px;
                border-radius: 8px;
                border: 1px solid rgba(128, 128, 128, 0.4);
                background: rgba(255, 255, 255, 0.7);
                color: inherit;
                box-sizing: border-box;
                width: 100%;
                resize: vertical;
            }
            @media (prefers-color-scheme: dark) {
                .field input,
                .field textarea,
                .field select {
                    background: rgba(0, 0, 0, 0.3);
                }
            }
            .field input:focus,
            .field textarea:focus,
            .field select:focus {
                outline: 2px solid #d97757;
                outline-offset: 0;
                border-color: transparent;
            }
            .row2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .checkbox {
                flex-direction: row;
                align-items: center;
                gap: 8px;
            }
            .checkbox input {
                width: auto;
            }
            .segmented {
                display: flex;
                gap: 6px;
            }
            .segmented button {
                flex: 1;
                font:
                    500 12px -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                padding: 7px 10px;
                border-radius: 8px;
                border: 1px solid rgba(128, 128, 128, 0.4);
                background: transparent;
                color: inherit;
                cursor: pointer;
                opacity: 0.75;
            }
            .segmented button:hover {
                opacity: 1;
            }
            .segmented button[aria-pressed="true"] {
                background: #d97757;
                border-color: #d97757;
                color: #fff;
                opacity: 1;
            }
            .actions {
                display: flex;
                gap: 8px;
            }
            .actions button {
                flex: 1;
                font:
                    600 13px -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                padding: 9px 12px;
                border-radius: 999px;
                border: 1px solid currentColor;
                background: transparent;
                color: inherit;
                cursor: pointer;
                opacity: 0.8;
            }
            .actions button:hover {
                opacity: 1;
            }
            #hero {
                width: 100%;
            }

            /* A generic "result" that fades into the loading stage. */
            .preview {
                position: absolute;
                inset: 0;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 18px;
                align-content: center;
                background: linear-gradient(135deg, #f6f3ee, #eae5db);
                color: #2a2721;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }
            .tier {
                border: 1px solid rgba(0, 0, 0, 0.1);
                border-radius: 10px;
                padding: 12px 10px;
                background: #fff;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .tier.hot {
                border-color: #d97757;
                box-shadow: 0 6px 18px rgba(217, 119, 87, 0.22);
            }
            .tier b {
                font-size: 12px;
            }
            .tier em {
                font-style: normal;
                font-size: 17px;
                font-weight: 700;
            }
            .tier .row {
                height: 5px;
                border-radius: 3px;
                background: rgba(0, 0, 0, 0.09);
            }
            .tier button {
                margin-top: auto;
                border: 0;
                border-radius: 7px;
                padding: 6px;
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                background: rgba(0, 0, 0, 0.07);
                color: #2a2721;
            }
            .tier.hot button {
                background: #d97757;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div class="lede">
            <h1>claude-chat-mockup</h1>
            <p>Every prop, live. Edit the controls on the left and watch the mockup update.</p>
        </div>

        <div class="layout">
            <form class="panel" id="controls" autocomplete="off">
                <h2>Content</h2>
                <div class="field">
                    <label for="prompt">prompt</label>
                    <textarea id="prompt" data-bind="prompt" rows="3"></textarea>
                </div>
                <div class="field">
                    <label for="response">response</label>
                    <textarea id="response" data-bind="response" rows="2"></textarea>
                </div>

                <h2>Tool line</h2>
                <div class="row2">
                    <div class="field">
                        <label for="toolName">tool.name</label>
                        <input id="toolName" data-bind="toolName" type="text" />
                    </div>
                    <div class="field">
                        <label for="toolCall">tool.call</label>
                        <input id="toolCall" data-bind="toolCall" type="text" />
                    </div>
                </div>
                <div class="field">
                    <label for="toolTitle">tool.title</label>
                    <input id="toolTitle" data-bind="toolTitle" type="text" />
                </div>

                <h2>Chrome</h2>
                <div class="row2">
                    <div class="field">
                        <label for="avatar">avatar</label>
                        <input id="avatar" data-bind="avatar" type="text" />
                    </div>
                    <div class="field">
                        <label for="stageHeight">stage.height <code>px</code></label>
                        <input id="stageHeight" data-bind="stageHeight" type="number" min="120" max="600" step="10" />
                    </div>
                </div>
                <div class="row2">
                    <div class="field">
                        <label for="model">model</label>
                        <input id="model" data-bind="model" type="text" />
                    </div>
                    <div class="field">
                        <label for="effort">effort</label>
                        <input id="effort" data-bind="effort" type="text" />
                    </div>
                </div>
                <div class="field">
                    <label for="placeholder">placeholder</label>
                    <input id="placeholder" data-bind="placeholder" type="text" />
                </div>
                <div class="field">
                    <label for="footnote">footnote</label>
                    <input id="footnote" data-bind="footnote" type="text" />
                </div>

                <h2>Theme</h2>
                <div class="segmented" role="group" aria-label="Theme">
                    <button type="button" data-theme="auto" aria-pressed="true">Auto</button>
                    <button type="button" data-theme="light" aria-pressed="false">Light</button>
                    <button type="button" data-theme="dark" aria-pressed="false">Dark</button>
                </div>

                <h2>Stage</h2>
                <div class="field checkbox">
                    <input id="stageReady" data-bind="stageReady" type="checkbox" checked />
                    <label for="stageReady">stage.ready (reveal result)</label>
                </div>

                <div class="actions">
                    <button type="button" id="replay">↻ Replay load</button>
                    <button type="button" id="sample">Next sample</button>
                </div>
            </form>

            <main id="hero"></main>
        </div>

        <!-- In your app: import { ClaudeWindow } from "claude-chat-mockup" -->
        <script type="module">
            import { ClaudeWindow } from "../dist/index.mjs";

            const STAR_SVG =
                '<svg viewBox="0 0 24 24" width="21" height="21" aria-hidden="true"><path fill="#d97757" d="M12 2l1.9 5.6L19.5 9l-4.5 3.3L16.6 18 12 14.7 7.4 18l1.6-5.7L4.5 9l5.6-1.4z"/></svg>';

            // A few generic conversations to cycle through with "Next sample".
            const SAMPLES = [
                {
                    prompt: "Design a pricing section for my SaaS landing page — three tiers, an annual toggle, and a highlighted Pro plan.",
                    response: "Here's a responsive pricing section with Pro highlighted and an annual toggle.",
                    toolTitle: "Pricing Section",
                },
                {
                    prompt: "Write a SQL migration to add a soft-delete column to the orders table with an index.",
                    response: "Added a nullable deleted_at timestamp plus a partial index for live rows.",
                    toolTitle: "0007_soft_delete",
                },
                {
                    prompt: "Summarize this quarter's churn by plan and flag anything unusual.",
                    response: "Churn held steady except a spike on the Starter plan — details in the report.",
                    toolTitle: "Q3 Churn Report",
                },
            ];

            // The single source of truth for every option we expose in the UI.
            const state = {
                prompt: SAMPLES[0].prompt,
                response: SAMPLES[0].response,
                toolName: "claude",
                toolCall: "create_artifact",
                toolTitle: SAMPLES[0].toolTitle,
                avatar: "You",
                model: "Opus 4.8",
                effort: "High",
                placeholder: "Reply to Claude…",
                footnote: "Claude can make mistakes. Please double-check responses.",
                stageHeight: 300,
                theme: "auto",
                stageReady: true,
            };

            function makePreview() {
                const el = document.createElement("div");
                el.className = "preview";
                el.innerHTML = `
                    <div class="tier"><b>Starter</b><em>$0</em><div class="row"></div><div class="row"></div><button>Choose</button></div>
                    <div class="tier hot"><b>Pro</b><em>$29</em><div class="row"></div><div class="row"></div><button>Choose</button></div>
                    <div class="tier"><b>Team</b><em>$99</em><div class="row"></div><div class="row"></div><button>Choose</button></div>`;
                return el;
            }

            const hero = document.getElementById("hero");
            let chat = null;

            // Rebuild the window from `state`. Cheap enough to run on every edit,
            // and the controls live outside #hero so typing focus is never lost.
            function render() {
                if (chat) chat.destroy();
                chat = ClaudeWindow({
                    prompt: state.prompt,
                    response: state.response,
                    tool: {
                        name: state.toolName,
                        call: state.toolCall,
                        title: state.toolTitle || undefined,
                    },
                    avatar: state.avatar,
                    model: state.model,
                    effort: state.effort,
                    placeholder: state.placeholder,
                    footnote: state.footnote,
                    theme: state.theme,
                    stage: {
                        height: Number(state.stageHeight) || 300,
                        content: makePreview(),
                        ready: state.stageReady,
                    },
                }).mount(hero);
                const logo = chat.el.querySelector(".claude-tool-logo");
                if (logo) logo.innerHTML = STAR_SVG;
            }

            // Seed inputs from state, then bind them back to it.
            const form = document.getElementById("controls");
            for (const control of form.querySelectorAll("[data-bind]")) {
                const key = control.dataset.bind;
                if (control.type === "checkbox") control.checked = Boolean(state[key]);
                else control.value = state[key];

                control.addEventListener("input", () => {
                    state[key] = control.type === "checkbox" ? control.checked : control.value;
                    render();
                });
            }

            // Theme is a segmented control rather than a raw input.
            const themeButtons = [...form.querySelectorAll("[data-theme]")];
            for (const btn of themeButtons) {
                btn.addEventListener("click", () => {
                    state.theme = btn.dataset.theme;
                    themeButtons.forEach(b => b.setAttribute("aria-pressed", String(b === btn)));
                    render();
                });
            }

            // Replay the loader → reveal cross-fade without a full rebuild.
            document.getElementById("replay").addEventListener("click", () => {
                if (!chat) return;
                chat.setReady(false);
                setTimeout(() => chat.setReady(true), 650);
            });

            // Cycle sample content and sync the bound inputs.
            let sampleIndex = 0;
            document.getElementById("sample").addEventListener("click", () => {
                sampleIndex = (sampleIndex + 1) % SAMPLES.length;
                const sample = SAMPLES[sampleIndex];
                Object.assign(state, sample);
                for (const key of ["prompt", "response", "toolTitle"]) {
                    const control = form.querySelector(`[data-bind="${key}"]`);
                    if (control) control.value = state[key];
                }
                render();
            });

            render();
        </script>
    </body>
</html>
