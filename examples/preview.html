<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>claude-chat-mockup — preview</title>
        <link rel="stylesheet" href="../dist/style.css" />
        <style>
            :root {
                color-scheme: light;
            }
            body {
                margin: 0;
                display: flex;
                gap: 28px;
                align-items: flex-start;
                justify-content: center;
                padding: 40px;
                background: #f4f1ea;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }
            .shot {
                width: 440px;
            }

            /* A generic "result" that fades into the loading stage. */
            .preview {
                position: absolute;
                inset: 0;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 18px;
                align-content: center;
                background: linear-gradient(135deg, #f6f3ee, #eae5db);
                color: #2a2721;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }
            .preview.dark {
                background: linear-gradient(135deg, #23241f, #17180f);
                color: #f3f0e8;
            }
            .tier {
                border: 1px solid rgba(0, 0, 0, 0.1);
                border-radius: 10px;
                padding: 12px 10px;
                background: #fff;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .preview.dark .tier {
                background: rgba(255, 255, 255, 0.06);
                border-color: rgba(255, 255, 255, 0.12);
            }
            .tier.hot {
                border-color: #d97757;
                box-shadow: 0 6px 18px rgba(217, 119, 87, 0.22);
            }
            .tier b {
                font-size: 12px;
            }
            .tier em {
                font-style: normal;
                font-size: 17px;
                font-weight: 700;
            }
            .tier .row {
                height: 5px;
                border-radius: 3px;
                background: rgba(0, 0, 0, 0.09);
            }
            .preview.dark .tier .row {
                background: rgba(255, 255, 255, 0.14);
            }
            .tier button {
                margin-top: auto;
                border: 0;
                border-radius: 7px;
                padding: 6px;
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                background: rgba(0, 0, 0, 0.07);
                color: #2a2721;
            }
            .preview.dark .tier button {
                background: rgba(255, 255, 255, 0.12);
                color: #f3f0e8;
            }
            .tier.hot button {
                background: #d97757;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <main class="shot" id="light"></main>
        <main class="shot" id="dark"></main>

        <script type="module">
            import { ClaudeWindow } from "../dist/index.mjs";

            const STAR_SVG =
                '<svg viewBox="0 0 24 24" width="21" height="21" aria-hidden="true"><path fill="#d97757" d="M12 2l1.9 5.6L19.5 9l-4.5 3.3L16.6 18 12 14.7 7.4 18l1.6-5.7L4.5 9l5.6-1.4z"/></svg>';

            function makePreview(dark) {
                const el = document.createElement("div");
                el.className = dark ? "preview dark" : "preview";
                el.innerHTML = `
                    <div class="tier"><b>Starter</b><em>$0</em><div class="row"></div><div class="row"></div><button>Choose</button></div>
                    <div class="tier hot"><b>Pro</b><em>$29</em><div class="row"></div><div class="row"></div><button>Choose</button></div>
                    <div class="tier"><b>Team</b><em>$99</em><div class="row"></div><div class="row"></div><button>Choose</button></div>`;
                return el;
            }

            function build(mount, theme) {
                const dark = theme === "dark";
                const chat = ClaudeWindow({
                    prompt: "Design a pricing section for my SaaS landing page — three tiers, an annual toggle, and a highlighted Pro plan.",
                    response: "Here's a responsive pricing section with Pro highlighted and an annual toggle.",
                    tool: { name: "claude", call: "create_artifact", title: "Pricing Section" },
                    theme,
                    stage: { height: 300, content: makePreview(dark), ready: true },
                }).mount(mount);
                const logo = chat.el.querySelector(".claude-tool-logo");
                if (logo) logo.innerHTML = STAR_SVG;
            }

            build(document.getElementById("light"), "light");
            build(document.getElementById("dark"), "dark");
            window.__ready = true;
        </script>
    </body>
</html>
